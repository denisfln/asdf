esphome:
  name: automacao-ventilador
  friendly_name: "Automação Ventilador"

esp8266:
  board: nodemcuv2

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Definição dos pinos dos relés (saída)
output:
  - platform: gpio
    pin: D1  # GPIO5 - Relé Velocidade 1
    id: rele_vel1
    name: "Relé Velocidade 1"
    inverted: false
    
  - platform: gpio
    pin: D2  # GPIO4 - Relé Velocidade 2
    id: rele_vel2
    name: "Relé Velocidade 2"
    inverted: false
    
  - platform: gpio
    pin: D3  # GPIO0 - Relé Velocidade 3
    id: rele_vel3
    name: "Relé Velocidade 3"
    inverted: false
    
  - platform: gpio
    pin: D4  # GPIO2 - Relé Desliga (Segurança)
    id: rele_seguranca
    name: "Relé Segurança"
    inverted: false

# Definição dos botões (entrada)
binary_sensor:
  - platform: gpio
    pin:
      number: D5  # GPIO14 - Botão Liga/Desliga
      mode: INPUT_PULLUP
    name: "Botão Liga/Desliga"
    id: botao_onoff
    on_press:
      then:
        - script.execute: toggle_motor
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    
  - platform: gpio
    pin:
      number: D6  # GPIO12 - Botão Velocidade 1
      mode: INPUT_PULLUP
    name: "Botão Velocidade 1"
    id: botao_vel1
    on_press:
      then:
        - script.execute: set_velocidade_1
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    
  - platform: gpio
    pin:
      number: D7  # GPIO13 - Botão Velocidade 2
      mode: INPUT_PULLUP
    name: "Botão Velocidade 2"
    id: botao_vel2
    on_press:
      then:
        - script.execute: set_velocidade_2
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    
  - platform: gpio
    pin:
      number: D8  # GPIO15 - Botão Velocidade 3
      mode: INPUT_PULLUP
    name: "Botão Velocidade 3"
    id: botao_vel3
    on_press:
      then:
        - script.execute: set_velocidade_3
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

# Variáveis de estado com persistência
globals:
  - id: estado_motor
    type: int
    initial_value: '0'  # 0=Desligado, 1=Vel1, 2=Vel2, 3=Vel3
    restore_value: yes  # Restaura o estado anterior ao reiniciar
    
  - id: ultima_velocidade
    type: int
    initial_value: '1'  # Armazena a última velocidade ativa (padrão: Vel1)
    restore_value: yes  # Restaura a velocidade anterior ao reiniciar

# Scripts de controle com interbloqueio e memória
script:
  - id: desliga_todas_bobinas
    then:
      - output.turn_off: rele_vel1
      - output.turn_off: rele_vel2
      - output.turn_off: rele_vel3
      - delay: 100ms
  
  - id: set_velocidade_1
    then:
      - script.execute: desliga_todas_bobinas
      - delay: 50ms
      - output.turn_on: rele_seguranca
      - delay: 50ms
      - output.turn_on: rele_vel1
      - globals.set:
          id: estado_motor
          value: '1'
      - globals.set:
          id: ultima_velocidade
          value: '1'
  
  - id: set_velocidade_2
    then:
      - script.execute: desliga_todas_bobinas
      - delay: 50ms
      - output.turn_on: rele_seguranca
      - delay: 50ms
      - output.turn_on: rele_vel2
      - globals.set:
          id: estado_motor
          value: '2'
      - globals.set:
          id: ultima_velocidade
          value: '2'
  
  - id: set_velocidade_3
    then:
      - script.execute: desliga_todas_bobinas
      - delay: 50ms
      - output.turn_on: rele_seguranca
      - delay: 50ms
      - output.turn_on: rele_vel3
      - globals.set:
          id: estado_motor
          value: '3'
      - globals.set:
          id: ultima_velocidade
          value: '3'
  
  - id: desliga_motor
    then:
      - script.execute: desliga_todas_bobinas
      - delay: 50ms
      - output.turn_off: rele_seguranca
      - globals.set:
          id: estado_motor
          value: '0'
  
  - id: liga_velocidade_anterior
    then:
      - if:
          condition:
              lambda: 'return id(ultima_velocidade) == 1;'
          then:
            - script.execute: set_velocidade_1
          else:
            - if:
                condition:
                    lambda: 'return id(ultima_velocidade) == 2;'
                then:
                  - script.execute: set_velocidade_2
                else:
                  - script.execute: set_velocidade_3
  
  - id: toggle_motor
    then:
      - if:
          condition:
              lambda: 'return id(estado_motor) == 0;'
          then:
            # Motor desligado: liga na última velocidade memorizada
            - script.execute: liga_velocidade_anterior
          else:
            # Motor ligado: desliga
            - script.execute: desliga_motor

# Sensores de estado para Home Assistant
sensor:
  - platform: template
    name: "Estado do Motor"
    id: sensor_estado_motor
    lambda: |-
      if (id(estado_motor) == 0) {
        return 0;
      } else if (id(estado_motor) == 1) {
        return 1;
      } else if (id(estado_motor) == 2) {
        return 2;
      } else if (id(estado_motor) == 3) {
        return 3;
      }
      return 0;
    unit_of_measurement: ""
  
  - platform: template
    name: "Última Velocidade Memorizada"
    id: sensor_ultima_velocidade
    lambda: |-
      return id(ultima_velocidade);
    unit_of_measurement: ""

# Switch para integração com Home Assistant
switch:
  - platform: template
    name: "Motor Ventilador"
    id: switch_motor
    lambda: 'return id(estado_motor) != 0;'
    turn_on_action:
      then:
        - script.execute: liga_velocidade_anterior
    turn_off_action:
      then:
        - script.execute: desliga_motor
  
  - platform: template
    name: "Velocidade 1"
    id: switch_vel1
    lambda: 'return id(estado_motor) == 1;'
    turn_on_action:
      then:
        - script.execute: set_velocidade_1
    turn_off_action:
      then:
        - script.execute: desliga_motor
  
  - platform: template
    name: "Velocidade 2"
    id: switch_vel2
    lambda: 'return id(estado_motor) == 2;'
    turn_on_action:
      then:
        - script.execute: set_velocidade_2
    turn_off_action:
      then:
        - script.execute: desliga_motor
  
  - platform: template
    name: "Velocidade 3"
    id: switch_vel3
    lambda: 'return id(estado_motor) == 3;'
    turn_on_action:
      then:
        - script.execute: set_velocidade_3
    turn_off_action:
      then:
        - script.execute: desliga_motor
